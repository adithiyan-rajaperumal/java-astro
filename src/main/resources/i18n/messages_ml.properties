remedy.sevvai=സുബ്രഹ്മണ്യ പൂജയും വൈദീശ്വരൻ കോവിൽ വഴിപാടും നടത്തുക.
remedy.kalasarpa=ശിവപൂജയും ചിട്ടയായ ജീവിതവും നയിക്കുക.
remedy.sarpam=രാഹുകാലത്ത് ദുർഗ്ഗാപൂജ നടത്തുക.
remedy.pithru=പിതൃതർപ്പണം നടത്തുക.
remedy.putra=സന്താനഗോപാല മന്ത്രം ജപിക്കുക.
remedy.kalathira=ദമ്പതിപൂജയും വഴിപാടുകളും നടത്തുക.
nullification.sevvai.house_sign_exemption=പ്രത്യേക ഭാവവും രാശി ഇളവും കാരണം ചൊവ്വാദോഷം ഒഴിവാകുന്നു.

yoga.gajakesari=ഗജകേസരി യോഗം
yoga.gajakesari.desc=ചന്ദ്രനിൽ നിന്ന് കേന്ദ്രത്തിൽ വ്യാഴം സ്ഥിതി ചെയ്യുന്നു. ധനവും ബുദ്ധിയും തരുന്നു.
yoga.budha_aditya=ബുധാദിത്യ യോഗം
yoga.budha_aditya.desc=സൂര്യനും ബുധനും യോഗത്തിലാണ്. മികച്ച ബുദ്ധിശക്തി നൽകുന്നു.
yoga.chandra_mangal=ചന്ദ്ര മംഗള യോഗം
yoga.chandra_mangal.desc=ചന്ദ്രനും ചൊവ്വയും യോഗത്തിലാണ്. സാമ്പത്തിക അഭിവൃദ്ധി തരുന്നു.
yoga.ruchaka=രുചക യോഗം (പഞ്ച മഹാപുരുഷ യോഗം)
yoga.ruchaka.desc=ചൊവ്വ കേന്ദ്രത്തിൽ സ്വ/ഉച്ച രാശിയിലാണ്. നേതൃത്വവും ധൈര്യവും നൽകുന്നു.
yoga.bhadra=ഭദ്ര യോഗം (പഞ്ച മഹാപുരുഷ യോഗം)
yoga.bhadra.desc=ബുധൻ കേന്ദ്രത്തിൽ സ്വ/ഉച്ച രാശിയിലാണ്. ബിസിനസ്സ് ബുദ്ധിയും ദീർഘായുസ്സും തരുന്നു.
yoga.hamsa=ഹംസ യോഗം (പഞ്ച മഹാപുരുഷ യോഗം)
yoga.hamsa.desc=വ്യാഴം കേന്ദ്രത്തിൽ സ്വ/ഉച്ച രാശിയിലാണ്. ജ്ഞാനവും ആദരവും തരുന്നു.
yoga.malavya=മാളവ്യ യോഗം (പഞ്ച മഹാപുരുഷ യോഗം)
yoga.malavya.desc=ശുക്രൻ കേന്ദ്രത്തിൽ സ്വ/ഉച്ച രാശിയിലാണ്. സുഖഭോഗങ്ങളും കലാവാസനയും തരുന്നു.
yoga.sasa=ശശ യോഗം (പഞ്ച മഹാപുരുഷ യോഗം)
yoga.sasa.desc=ശനി കേന്ദ്രത്തിൽ സ്വ/ഉച്ച രാശിയിലാണ്. അധികാരവും ക്ഷമയും നൽകുന്നു.
yoga.neechabhanga=നീചഭംഗ രാജയോഗം
yoga.neechabhanga.desc=നീച ഗ്രഹത്തിന്റെ രാശ്യാധിപൻ കേന്ദ്രത്തിൽ നിൽക്കുന്നതിനാൽ നീചഭംഗ രാജയോഗം നൽകുന്നു.
yoga.dharma_karmadhipati=ധർമ്മ-കർമ്മാധിപതി യോഗം
yoga.dharma_karmadhipati.desc=9-ാം അധിപനും 10-ാം അധിപനും ചേരുകയോ പരസ്പരം നോക്കുകയോ ചെയ്യുന്നു. വലിയ തൊഴിൽ വിജയവും സ്ഥാനമാനങ്ങളും നൽകുന്നു.
yoga.rajayogam=കേന്ദ്ര-ത്രികോണ രാജയോഗം
yoga.rajayogam.desc=കേന്ദ്ര അധിപനും ത്രികോണ അധിപനും യോഗത്തിലാണ്. വൻ സഭാഗ്യവും അഭിവൃദ്ധിയും തരുന്നു.
