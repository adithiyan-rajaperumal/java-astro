gowri.laabam=ലാഭം (വ്യാപാരത്തിനും നിക്ഷേപങ്ങൾക്കും ഉത്തമം)
gowri.dhanam=ധനം (സാമ്പത്തിക ഇടപാടുകൾക്കും സ്വർണം വാങ്ങലിനും ഉത്തമം)
gowri.sugam=സുഖം (ആരോഗ്യത്തിനും കുടുംബ കാര്യങ്ങൾക്കും ഉത്തമം)
