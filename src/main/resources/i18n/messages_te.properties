yoga.gajakesari=గజకేసరి యోగం
yoga.gajakesari.desc=చంద్రుని నుండి కేంద్రంలో గురుడు ఉన్నాడు. సంపద, బుద్ధిమత్తత మరియు మంచి పేరు ఇస్తుంది.
yoga.budha_aditya=బుధాదిత్య యోగం
yoga.budha_aditya.desc=సూర్యుడు మరియు బుధుల యుతి. తీవ్రమైన బుద్ధి మరియు కీర్తి ఇస్తుంది.
yoga.chandra_mangal=చంద్ర మంగళ యోగం
yoga.chandra_mangal.desc=చంద్రుడు మరియు కుజుల యుతి. ఆర్థికాభివృద్ధి మరియు ధన లాభం ఇస్తుంది.
yoga.ruchaka=రుచక యోగం (పంచ మహాపురుష యోగం)
yoga.ruchaka.desc=కుజుడు కేంద్రంలో స్వ/ఉచ్ఛ రాశిలో ఉన్నాడు. నాయకత్వం మరియు శౌర్యం ఇస్తుంది.
yoga.bhadra=భద్ర యోగం (పంచ మహాపురుష యోగం)
yoga.bhadra.desc=బుధుడు కేంద్రంలో స్వ/ఉచ్ఛ రాశిలో ఉన్నాడు. వ్యాపార నైపుణ్యం మరియు తెలివితేటలు ఇస్తుంది.
yoga.hamsa=హంస యోగం (పంచ మహాపురుష యోగం)
yoga.hamsa.desc=గురుడు కేంద్రంలో స్వ/ఉచ్ఛ రాశిలో ఉన్నాడు. జ్ఞానం మరియు గౌరవం ఇస్తుంది.
yoga.malavya=మాళవ్య యోగం (పంచ మహాపురుష యోగం)
yoga.malavya.desc=శుక్రుడు కేంద్రంలో స్వ/ఉచ్ఛ రాశిలో ఉన్నాడు. సౌందర్యం మరియు సుఖ భోగాలు ఇస్తుంది.
yoga.sasa=శశ యోగం (పంచ మహాపురుష యోగం)
yoga.sasa.desc=శని కేంద్రంలో స్వ/ఉచ్ఛ రాశిలో ఉన్నాడు. అధికారం మరియు సహనం ఇస్తుంది.
yoga.neechabhanga=నీచభంగ రాజయోగం
yoga.neechabhanga.desc=నీచ గ్రహం యొక్క రాశ్యాధిపతి కేంద్రంలో ఉండటం వల్ల నీచభంగ రాజయోగం ఏర్పడుతుంది.
yoga.dharma_karmadhipati=ధర్మ-కర్మాధిపతి యోగం
yoga.dharma_karmadhipati.desc=9వ మరియు 10వ అధిపతుల యుతి లేదా దృష్టి. గొప్ప వృత్తిపరమైన విజయాన్ని ఇస్తుంది.
yoga.rajayogam=కేంద్ర-త్రికోణ రాజయోగం
yoga.rajayogam.desc=కేంద్ర మరియు త్రికోణ అధిపతుల యుతి. సంపద మరియు గొప్ప కీర్తిని ఇస్తుంది.
