nullification.sevvai.benefic_sign=1 அல்லது 2-ம் வீட்டில் சுப ராசியில் (கடகம், தனுசு, மீனம்) செவ்வாய் உள்ளார்.

nullification.kalasarpa.conjunct=ஒரு கிரகம் ராகு அல்லது கேதுவுடன் சேர்க்கை பெற்றுள்ளது.
nullification.kalasarpa.jupiter_aspect=குரு ராகு அல்லது கேதுவைப் பார்க்கிறார்.

nullification.sarpam.jupiter_kendra=குரு ராகுவிற்கு கேந்திரத்தில் உள்ளார்.
nullification.sarpam.jupiter_aspect=குரு ராகு அல்லது கேதுவைப் பார்க்கிறார்.
nullification.sarpam.own_exalted=ராகு/கேது ஆட்சி அல்லது உச்ச ராசியில் உள்ளனர்.

nullification.pithru.jupiter_aspect=குரு 9-ம் வீட்டை அல்லது சூரியனைப் பார்க்கிறார்.
nullification.pithru.own_exalted=சூரியன் ஆட்சி அல்லது உச்ச ராசியில் உள்ளார்.
nullification.pithru.benefic=சுப கிரகங்கள் (சுக்கிரன், புதன்) சூரியனுடன் சேர்க்கை பெற்றுள்ளன.

nullification.putra.jupiter=குரு 5-ம் வீட்டில் உள்ளார் அல்லது 5-ம் வீட்டைப் பார்க்கிறார்.
nullification.putra.benefic=சுப கிரகங்கள் 5-ம் வீட்டில் உள்ளன.

nullification.kalathira.venus_strong=சுக்கிரன் ஆட்சி அல்லது உச்ச ராசியில் உள்ளார்.
nullification.kalathira.jupiter_aspect=குரு 7-ம் வீட்டைப் பார்க்கிறார்.

nullification.shani.own_exalted=சனி ஆட்சி அல்லது உச்ச ராசியில் உள்ளார்.
nullification.shani.jupiter_aspect=குரு சனியைப் பார்க்கிறார்.
nullification.shani.yogakaraka=சனி இந்த லக்னத்திற்கு யோகாதிபதி ஆவார்.

remedy.sevvai=வைத்தீஸ்வரன் கோவில் வழிபாடு செய்யவும்.
remedy.kalasarpa=பொறுமை மற்றும் ஒழுக்கமான வழிபாடுகளை மேற்கொள்ளவும்.
remedy.sarpam=ராகு காலத்தில் துர்க்கை அம்மனை வழிபடவும்.
remedy.pithru=முன்னோர்களுக்கு தர்ப்பணம் மற்றும் வழிபாடு செய்யவும்.
remedy.putra=சந்தான கோபால மந்திரம் ஜபிக்கவும்.
remedy.kalathira=சுமங்கலி வழிபாடு மற்றும் திருக்கல்யாணம் தரிசனம் செய்யவும்.
remedy.shani=சனிக்கிழமைகளில் நல்லெண்ணெய் தீபம் ஏற்றவும்.

nullification.sevvai.house_sign_exemption=குறிப்பிட்ட வீடு மற்றும் ராசி விதிவிலக்கு காரணமாக செவ்வாய் தோஷம் நிவர்த்தி ஆகிறது.

yoga.gajakesari=கஜகேசரி யோகம்
yoga.gajakesari.desc=சந்திரனுக்கு கேந்திரத்தில் குரு உள்ளார். செல்வம், அறிவு மற்றும் நற்பண்புகளைத் தரும்.
yoga.budha_aditya=புதாதித்ய யோகம்
yoga.budha_aditya.desc=சூரியனும் புதனும் சேர்க்கை பெற்றுள்ளனர். கூர்மையான அறிவு, புகழ் மற்றும் உரையாடல் திறனைத் தரும்.
yoga.chandra_mangal=சந்திர மங்கள யோகம்
yoga.chandra_mangal.desc=சந்திரனும் செவ்வாயும் சேர்க்கை பெற்றுள்ளனர். பொருளாதார வளர்ச்சியைத் தரும்.
yoga.ruchaka=ருசக யோகம் (பஞ்ச மகாபுருஷ யோகம்)
yoga.ruchaka.desc=செவ்வாய் கேந்திரத்தில் ஆட்சி/உச்சம் பெற்றுள்ளார். தைரியம், தலைமைத்துவம் மற்றும் பலம் தரும்.
yoga.bhadra=பத்ர யோகம் (பஞ்ச மகாபுருஷ யோகம்)
yoga.bhadra.desc=புதன் கேந்திரத்தில் ஆட்சி/உச்சம் பெற்றுள்ளார். புத்தி கூர்மை மற்றும் வியாபார வெற்றி தரும்.
yoga.hamsa=ஹம்ச யோகம் (பஞ்ச மகாபுருஷ யோகம்)
yoga.hamsa.desc=குரு கேந்திரத்தில் ஆட்சி/உச்சம் பெற்றுள்ளார். ஞானம், ஆன்மீக சிந்தனை மற்றும் மரியாதையைத் தரும்.
yoga.malavya=மாளவ்ய யோகம் (பஞ்ச மகாபுருஷ யோகம்)
yoga.malavya.desc=சுக்கிரன் கேந்திரத்தில் ஆட்சி/உச்சம் பெற்றுள்ளார். சுகபோகம், கலைத்திறன் மற்றும் கவர்ச்சி தரும்.
yoga.sasa=சச யோகம் (பஞ்ச மகாபுருஷ யோகம்)
yoga.sasa.desc=சனி கேந்திரத்தில் ஆட்சி/உச்சம் பெற்றுள்ளார். அதிகார பலம், பொறுமை மற்றும் விடாமுயற்சி தரும்.
yoga.neechabhanga=நீசபங்க ராஜயோகம்
yoga.neechabhanga.desc=நீசமடைந்த கிரகத்தின் ராசிநாதன் கேந்திரத்தில் உள்ளதால் நீசபங்கம் அடைந்து யோகம் தரும்.
yoga.dharma_karmadhipati=தர்ம-கர்மாதிபதி யோகம்
yoga.dharma_karmadhipati.desc=9-ஆம் அதிபதி (தர்மம்) மற்றும் 10-ஆம் அதிபதி (கர்மா) சேர்க்கை அல்லது பார்வை பெற்றுள்ளனர். உயர்ந்த தொழில் வெற்றியையும் அதிகாரத்தையும் தரும்.
yoga.rajayogam=கேந்திர-திரிகோண ராஜயோகம்
yoga.rajayogam.desc=கேந்திர அதிபதியும் திரிகோண அதிபதியும் சேர்க்கை பெற்றுள்ளனர். பெரும் செல்வம், அந்தஸ்து மற்றும் யோக பலன்களைத் தரும்.
yoga.vipareeta=விபரீத ராஜயோகம்
yoga.vipareeta.desc=மறைவிட அதிபதிகள் (6, 8, 12) மறைவிடங்களில் அமர்ந்து எதிர்பாராத அதிர்ஷ்டத்தையும் வெற்றியையும் தருவார்கள்.
nextDay=அடுத்த நாள்
panchangam.abhijit_muhurtham=அபிஜித் முகூர்த்தம்
panchangam.nullified=ரத்து செய்யப்பட்டது
