nullification.sarpam.jupiter_kendra=ಗುರು ರಾಹುವಿನಿಂದ ಕೇಂದ್ರದಲ್ಲಿದ್ದಾನೆ.
nullification.sarpam.jupiter_aspect=ಗುರು ರಾಹು ಅಥವಾ ಕೇತುವನ್ನು ವೀಕ್ಷಿಸುತ್ತಿದ್ದಾನೆ.
nullification.sarpam.own_exalted=ರಾಹು/ಕೇತು ಸ್ವಕ್ಷೇತ್ರ ಅಥವಾ ಉಚ್ಚ ರಾಶಿಯಲ್ಲಿದ್ದಾರೆ.

nullification.pithru.jupiter_aspect=ಗುರು 9ನೇ ಮನೆ ಅಥವಾ ಸೂರ್ಯನನ್ನು ವೀಕ್ಷಿಸುತ್ತಿದ್ದಾನೆ.
nullification.pithru.own_exalted=ಸೂರ್ಯ ಸ್ವಕ್ಷೇತ್ರ ಅಥವಾ ಉಚ್ಚ ರಾಶಿಯಲ್ಲಿದ್ದಾನೆ.
nullification.pithru.benefic=ಶುಭ ಗ್ರಹಗಳು ಸೂರ್ಯನೊಂದಿಗೆ ಯುತಿಯಲ್ಲಿವೆ.

nullification.putra.jupiter=ಗುರು 5ನೇ ಮನೆಯಲ್ಲಿದ್ದಾನೆ ಅಥವಾ 5ನೇ ಮನೆಯನ್ನು ವೀಕ್ಷಿಸುತ್ತಿದ್ದಾನೆ.
