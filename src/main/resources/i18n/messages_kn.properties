nullification.kalathira.jupiter_aspect=ಗುರು 7ನೇ ಮನೆಯನ್ನು ವೀಕ್ಷಿಸುತ್ತಿದ್ದಾನೆ.

nullification.shani.own_exalted=ಶನಿ ಸ್ವಕ್ಷೇತ್ರ ಅಥವಾ ಉಚ್ಚ ರಾಶಿಯಲ್ಲಿದ್ದಾನೆ.
nullification.shani.jupiter_aspect=ಗುರು ಶನಿಯನ್ನು ವೀಕ್ಷಿಸುತ್ತಿದ್ದಾನೆ.
