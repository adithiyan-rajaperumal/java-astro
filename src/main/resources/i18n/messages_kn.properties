remedy.sevvai=ಸುಬ್ರಹ್ಮಣ್ಯ ಅಥವಾ ವೈದೀಶ್ವರನ್ ಕೋವಿಲ್ ಪೂಜೆ ಮಾಡಿ.
remedy.kalasarpa=ಶಿವ ಪೂಜೆ ಮತ್ತು ಶಿಸ್ತುಬದ್ಧ ಜೀವನ ನಡೆಸಿ.
remedy.sarpam=ರಾಹು ಕಾಲದಲ್ಲಿ ದುರ್ಗಾ ಪೂಜೆ ಮಾಡಿ.
remedy.pithru=ಪಿತೃ ತರ್ಪಣ ಮತ್ತು ಹಿರಿಯರ ಸೇವೆ ಮಾಡಿ.
remedy.putra=ಸಂತಾನ ಗೋಪಾಲ ಪೂಜೆ ಮಾಡಿ.
remedy.kalathira=ದಂಪತಿ ಪೂಜೆ ಮತ್ತು ಕಲ್ಯಾಣ ದರ್ಶನ ಮಾಡಿ.
nullification.sevvai.house_sign_exemption=ವಿಶಿಷ್ಟ ಭಾವ ಮತ್ತು ರಾಶಿ ವಿನಾಯಿತಿಯಿಂದ ಕುಜ ದೋಷ ರದ್ದಾಗುತ್ತದೆ.

yoga.gajakesari=ಗಜಕೇಸರಿ ಯೋಗ
yoga.gajakesari.desc=ಚಂದ್ರನಿಂದ ಕೇಂದ್ರದಲ್ಲಿ ಗುರು ಇದ್ದಾನೆ. ಸಂಪತ್ತು, ಬುದ್ಧಿವಂತಿಕೆ ಮತ್ತು ಸದ್ಗುಣ ನೀಡುತ್ತದೆ.
yoga.budha_aditya=ಬುಧಾದಿತ್ಯ ಯೋಗ
yoga.budha_aditya.desc=ಸೂರ್ಯ ಮತ್ತು ಬುಧ ಯುತಿ. ತೀವ್ರ ಬುದ್ಧಿವಂತಿಕೆ ಮತ್ತು ಕೀರ್ತಿ ನೀಡುತ್ತದೆ.
yoga.chandra_mangal=ಚಂದ್ರ ಮಂಗಳ ಯೋಗ
yoga.chandra_mangal.desc=ಚಂದ್ರ ಮತ್ತು ಕುಜ ಯುತಿ. ಆರ್ಥಿಕ ಪ್ರಗತಿ ನೀಡುತ್ತದೆ.
yoga.ruchaka=ರುಚಕ ಯೋಗ (ಪಂಚ ಮಹಾಪುರುಷ ಯೋಗ)
yoga.ruchaka.desc=ಕುಜ ಕೇಂದ್ರದಲ್ಲಿ ಸ್ವ/ಉಚ್ಚ ರಾಶಿಯಲ್ಲಿದ್ದಾನೆ. ನಾಯಕತ್ವ ಮತ್ತು ಶೌರ್ಯ ನೀಡುತ್ತದೆ.
yoga.bhadra=ಭದ್ರ ಯೋಗ (ಪಂಚ ಮಹಾಪುರುಷ ಯೋಗ)
yoga.bhadra.desc=ಬುಧ ಕೇಂದ್ರದಲ್ಲಿ ಸ್ವ/ಉಚ್ಚ ರಾಶಿಯಲ್ಲಿದ್ದಾನೆ. ವ್ಯಾಪಾರ ಕೌಶಲ್ಯ ಮತ್ತು ಬುದ್ಧಿವಂತಿಕೆ ನೀಡುತ್ತದೆ.
yoga.hamsa=ಹಂಸ ಯೋಗ (ಪಂಚ ಮಹಾಪುರುಷ ಯೋಗ)
yoga.hamsa.desc=ಗುರು ಕೇಂದ್ರದಲ್ಲಿ ಸ್ವ/ಉಚ್ಚ ರಾಶಿಯಲ್ಲಿದ್ದಾನೆ. ಜ್ಞಾನ ಮತ್ತು ಗೌರವ ನೀಡುತ್ತದೆ.
yoga.malavya=ಮಾಳವ್ಯ ಯೋಗ (ಪಂಚ ಮಹಾಪುರುಷ ಯೋಗ)
yoga.malavya.desc=ಶುಕ್ರ ಕೇಂದ್ರದಲ್ಲಿ ಸ್ವ/ಉಚ್ಚ ರಾಶಿಯಲ್ಲಿದ್ದಾನೆ. ಸೌಂದರ್ಯ ಮತ್ತು ಭೋಗ ಭಾಗ್ಯ ನೀಡುತ್ತದೆ.
yoga.sasa=ಶಶ ಯೋಗ (ಪಂಚ ಮಹಾಪುರುಷ ಯೋಗ)
yoga.sasa.desc=ಶನಿ ಕೇಂದ್ರದಲ್ಲಿ ಸ್ವ/ಉಚ್ಚ ರಾಶಿಯಲ್ಲಿದ್ದಾನೆ. ಅಧಿಕಾರ ಮತ್ತು ಸಹನೆ ನೀಡುತ್ತದೆ.
yoga.neechabhanga=ನೀಚಭಂಗ ರಾಜಯೋಗ
yoga.neechabhanga.desc=ನೀಚ ಗ್ರಹದ ಅಧಿಪತಿ ಕೇಂದ್ರದಲ್ಲಿದ್ದು ನೀಚಭಂಗ ರಾಜಯೋಗ ನೀಡುತ್ತದೆ.
yoga.dharma_karmadhipati=ಧರ್ಮ-ಕರ್ಮಾಧಿಪತಿ ಯೋಗ
yoga.dharma_karmadhipati.desc=9ನೇ ಮತ್ತು 10ನೇ ಅಧಿಪತಿಗಳ ಯುತಿ ಅಥವಾ ದೃಷ್ಟಿ. ಉದ್ಯೋಗ ಯಶಸ್ಸು ಮತ್ತು ಅಧಿಕಾರ ನೀಡುತ್ತದೆ.
yoga.rajayogam=ಕೇಂದ್ರ-ತ್ರಿಕೋಣ ರಾಜಯೋಗ
yoga.rajayogam.desc=ಕೇಂದ್ರ ಮತ್ತು ತ್ರಿಕೋಣ ಅಧಿಪತಿಗಳ ಯುತಿ. ಭಾಗ್ಯ ಮತ್ತು ಪ್ರಗತಿ ತರುತ್ತದೆ.
