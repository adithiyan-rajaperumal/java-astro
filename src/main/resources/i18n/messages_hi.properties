yoga.ruchaka.desc=मंगल केंद्र में स्व/उच्च राशि में है। नेतृत्व, साहस और शारीरिक शक्ति प्रदान करता है।
yoga.bhadra=भद्र योग (पंच महापुरुष योग)
yoga.bhadra.desc=बुध केंद्र में स्व/उच्च राशि में है। उच्च बुद्धि, व्यापारिक सफलता और दीर्घायु देता है।
yoga.hamsa=हंस योग (पंच महापुरुष योग)
yoga.hamsa.desc=गुरु केंद्र में स्व/उच्च राशि में है। ज्ञान, आध्यात्मिक झुकाव और आदर प्रदान करता है।
yoga.malavya=मालव्य योग (पंच महापुरुष योग)
yoga.malavya.desc=शुक्र केंद्र में स्व/उच्च राशि में है। सुख-सुविधाएं, कलात्मक प्रतिभा और आकर्षण प्रदान करता है।
yoga.sasa=शश योग (पंच महापुरुष योग)
yoga.sasa.desc=शनि केंद्र में स्व/उच्च राशि में है। अधिकार, धैर्य और दृढ़ता प्रदान करता है।
yoga.neechabhanga=नीचभंग राजयोग
yoga.neechabhanga.desc=नीच ग्रह का डिस्पोजिटर केंद्र में स्थित होने से नीचभंग होकर राजयोग फल मिलता है।
yoga.dharma_karmadhipati=धर्म-कर्माधिपति योग
yoga.dharma_karmadhipati.desc=9वें (धर्म) और 10वें (कर्म) भाव के स्वामियों की युति या दृष्टि। उच्च व्यावसायिक सफलता और सम्मान देता है।
yoga.rajayogam=केंद्र-त्रिकोण राजयोग
yoga.rajayogam.desc=केंद्र स्वामी (1,4,7,10) और त्रिकोण स्वामी (5,9) की युति। अपार समृद्धि और सफलता देता है।
